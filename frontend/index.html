<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashDust</title>
    <link data-trunk rel="icon" href="favicon.ico" type="image/x-icon"/>
    <link data-trunk rel="rust" data-wasm-opt="z"/>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:       #0d0f14;
            --bg-card:  #111520;
            --bg-item:  rgba(255,255,255,0.025);
            --border:   #1a2236;
            --border-h: #253049;
            --t1: #e8eaf0;
            --t2: #6b7a99;
            --t3: #2e3a52;
            --blue:   #4a9eff;
            --purple: #9b6dff;
            --teal:   #2dd4bf;
            --green:  #4ade80;
            --orange: #fb923c;
            --red:    #f87171;
        }

        body {
            background: var(--bg);
            color: var(--t1);
            font-family: 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        .dashboard {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        /* ── Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 0;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .header-left { display: flex; align-items: center; gap: 1rem; }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hostname {
            font-size: 0.8rem;
            color: var(--t2);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
        }

        .status {
            font-size: 0.78rem;
            font-weight: 600;
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
        }
        .status.online  { color: var(--green);  background: rgba(74,222,128,.08);  border: 1px solid rgba(74,222,128,.2); }
        .status.offline { color: var(--red);    background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); }

        /* ── Grid */
        .main {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1rem;
        }

        /* ── Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.4rem;
            transition: border-color .25s, transform .25s;
            position: relative;
            overflow: hidden;
        }
        .card:hover { border-color: var(--border-h); transform: translateY(-2px); }

        .card-system  { grid-column: span 4; }
        .card-cpu     { grid-column: span 8; }
        .card-memory  { grid-column: span 6; }
        .card-storage { grid-column: span 6; }
        .card-network { grid-column: span 12; }

        @media (max-width: 1100px) {
            .card-system, .card-cpu, .card-memory, .card-storage { grid-column: span 6; }
        }
        @media (max-width: 700px) {
            .card-system, .card-cpu, .card-memory, .card-storage, .card-network { grid-column: span 12; }
        }

        /* ── Card header */
        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.1rem;
        }
        .card-icon { color: var(--blue); font-size: 0.85rem; }
        .card-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--t2);
        }
        .chart-val {
            margin-left: auto;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--t1);
            font-variant-numeric: tabular-nums;
        }

        /* ── Info grid */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .55rem; }

        .info-item {
            background: var(--bg-item);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .65rem .75rem;
        }
        .info-label {
            display: block;
            font-size: .65rem;
            color: var(--t3);
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: .3rem;
        }
        .info-value {
            display: block;
            font-size: .87rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── CPU brand */
        .cpu-brand {
            font-size: .92rem;
            font-weight: 600;
            margin-bottom: .9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Area chart */
        .chart-wrap {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.015);
            border: 1px solid var(--border);
        }
        .chart-wrap svg { display: block; }

        .chart-axis {
            position: absolute;
            top: 4px;
            right: 6px;
            bottom: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: .6rem;
            color: var(--t3);
            pointer-events: none;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* ── Donut (storage) */
        .donuts { display: flex; flex-wrap: wrap; gap: 1.5rem; }

        .donut { display: flex; align-items: center; gap: 1rem; }

        .donut-meta {
            display: flex;
            flex-direction: column;
            gap: .35rem;
        }
        .disk-name { font-size: .85rem; font-weight: 500; }
        .disk-badge {
            display: inline-block;
            font-size: .62rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: .15rem .45rem;
            border-radius: 999px;
            background: rgba(74,158,255,.1);
            border: 1px solid rgba(74,158,255,.2);
            color: var(--blue);
            width: fit-content;
        }
        .disk-size { font-size: .75rem; color: var(--t2); font-variant-numeric: tabular-nums; }

        /* ── Network */
        .net-charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 700px) { .net-charts { grid-template-columns: 1fr; } }

        .net-chart-hdr {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin-bottom: .5rem;
        }
        .net-arrow { font-size: 1rem; font-weight: 700; }
        .net-down  { color: var(--teal); }
        .net-up    { color: var(--purple); }
        .net-chart-lbl { font-size: .72rem; color: var(--t2); }

        .net-ifaces {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            margin-top: .5rem;
        }
        .net-iface {
            display: flex;
            align-items: center;
            gap: .75rem;
            background: var(--bg-item);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .45rem .75rem;
            font-size: .75rem;
            font-variant-numeric: tabular-nums;
        }
        .net-iface-name { font-weight: 600; color: var(--t1); }
    </style>
</head>
<body>
</body>
</html>
